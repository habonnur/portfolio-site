<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#171613"/>
    </marker>
  </defs>
  <style>
    .hn { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-weight: 700; fill: #171613; }
    .bk { font-family: Baskerville, Georgia, serif; font-style: italic; fill: #171613; }
    .box { fill: none; stroke: #171613; stroke-width: 2; }
    .ink { fill: #171613; }
    .line { stroke: #171613; stroke-width: 2; }
    .pp { fill: #F2EBDC !important; }
  </style>

  <rect width="900" height="520" fill="#F2EBDC"/>

  <text x="62" y="52" class="hn" font-size="24" letter-spacing="-0.5">FIG. 1 — HERMES. A 24/7 PERSONAL AGENT.</text>
  <text x="62" y="76" class="bk" font-size="15">Self-hosted, scheduled, and audited.</text>

  <!-- Cron -->
  <rect x="62" y="110" width="180" height="64" class="box"/>
  <text x="152" y="138" class="hn" font-size="14" text-anchor="middle">CRON</text>
  <text x="152" y="158" class="bk" font-size="13" text-anchor="middle">brief 1×/day · pulse 6×/day</text>

  <!-- Gmail -->
  <rect x="62" y="218" width="180" height="64" class="box"/>
  <text x="152" y="246" class="hn" font-size="14" text-anchor="middle">GMAIL</text>
  <text x="152" y="266" class="bk" font-size="13" text-anchor="middle">inbox, read-only</text>

  <!-- Hermes agent — the emphasis box, ink field -->
  <rect x="320" y="118" width="260" height="140" class="ink"/>
  <text x="450" y="150" class="hn pp" font-size="16" text-anchor="middle">THE AGENT.</text>
  <text x="450" y="172" class="bk pp" font-size="13" text-anchor="middle">Docker, on a server I hold the keys to.</text>
  <text x="450" y="204" class="hn pp" font-size="13" text-anchor="middle">MORNING BRIEF</text>
  <text x="450" y="226" class="hn pp" font-size="13" text-anchor="middle">PULSE — INBOX WATCH</text>

  <!-- Guardrails -->
  <rect x="320" y="306" width="260" height="96" class="box" stroke-dasharray="6 5"/>
  <text x="450" y="334" class="hn" font-size="14" text-anchor="middle">GUARDRAILS</text>
  <text x="450" y="356" class="bk" font-size="13" text-anchor="middle">message-ID receipts · verify before posting</text>
  <text x="450" y="376" class="bk" font-size="13" text-anchor="middle">fail loud · audit footer on every run</text>
  <line x1="450" y1="258" x2="450" y2="306" class="line" stroke-dasharray="4 4"/>

  <!-- Slack -->
  <rect x="658" y="118" width="180" height="64" class="box"/>
  <text x="748" y="146" class="hn" font-size="14" text-anchor="middle">SLACK</text>
  <text x="748" y="166" class="bk" font-size="13" text-anchor="middle">briefs and alerts</text>

  <!-- Open Brain -->
  <rect x="658" y="230" width="180" height="78" class="box"/>
  <text x="748" y="258" class="hn" font-size="14" text-anchor="middle">OPEN BRAIN</text>
  <text x="748" y="278" class="bk" font-size="13" text-anchor="middle">self-owned memory bank</text>
  <text x="748" y="296" class="bk" font-size="13" text-anchor="middle">(Supabase)</text>

  <!-- Arrows -->
  <line x1="242" y1="142" x2="314" y2="164" class="line" marker-end="url(#arr)"/>
  <line x1="242" y1="250" x2="314" y2="222" class="line" marker-end="url(#arr)"/>
  <line x1="580" y1="160" x2="652" y2="150" class="line" marker-end="url(#arr)"/>
  <line x1="580" y1="230" x2="652" y2="262" class="line" marker-end="url(#arr)"/>
  <text x="596" y="262" class="bk" font-size="13">capture</text>

  <!-- Result line -->
  <line x1="62" y1="456" x2="838" y2="456" class="line"/>
  <text x="62" y="488" class="hn" font-size="15">Model cost under $1 a day · 0 fabricated items since guardrails shipped</text>
</svg>

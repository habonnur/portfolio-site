<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#171613"/>
    </marker>
  </defs>
  <style>
    .hn { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-weight: 700; fill: #171613; }
    .bk { font-family: Baskerville, Georgia, serif; font-style: italic; fill: #171613; }
    .box { fill: none; stroke: #171613; stroke-width: 2; }
    .ink { fill: #171613; }
    .line { stroke: #171613; stroke-width: 2; }
    .pp { fill: #F2EBDC !important; }
  </style>

  <rect width="900" height="520" fill="#F2EBDC"/>

  <text x="62" y="52" class="hn" font-size="24" letter-spacing="-0.5">FIG. 3 — THE OPEN ENGINE. GOVERNED AGENT WORK.</text>
  <text x="62" y="76" class="bk" font-size="15">Scoped tasks. Receipts for everything.</text>

  <!-- Linear queue -->
  <rect x="62" y="112" width="210" height="108" class="box"/>
  <text x="167" y="140" class="hn" font-size="14" text-anchor="middle">THE QUEUE</text>
  <text x="167" y="162" class="bk" font-size="13" text-anchor="middle">Linear · status: Agent Todo</text>
  <text x="167" y="182" class="bk" font-size="13" text-anchor="middle">labelled, scoped,</text>
  <text x="167" y="200" class="bk" font-size="13" text-anchor="middle">one outcome each</text>

  <!-- Agent — emphasis box -->
  <rect x="350" y="112" width="220" height="108" class="ink"/>
  <text x="460" y="142" class="hn pp" font-size="15" text-anchor="middle">THE AGENT.</text>
  <text x="460" y="166" class="bk pp" font-size="13" text-anchor="middle">claims exactly one task,</text>
  <text x="460" y="186" class="bk pp" font-size="13" text-anchor="middle">does the scoped work,</text>
  <text x="460" y="206" class="bk pp" font-size="13" text-anchor="middle">pauses and resumes cleanly</text>

  <!-- Receipts -->
  <rect x="648" y="100" width="190" height="146" class="box" stroke-dasharray="6 5"/>
  <text x="743" y="128" class="hn" font-size="14" text-anchor="middle">RECEIPTS</text>
  <text x="743" y="152" class="hn" font-size="12" text-anchor="middle">AGENT CLAIMED</text>
  <text x="743" y="172" class="hn" font-size="12" text-anchor="middle">AGENT DONE</text>
  <text x="743" y="192" class="hn" font-size="12" text-anchor="middle">AGENT BLOCKED</text>
  <text x="743" y="212" class="hn" font-size="12" text-anchor="middle">HUMAN HOLD</text>
  <text x="743" y="234" class="bk" font-size="12" text-anchor="middle">posted as issue comments</text>

  <!-- Status ledger -->
  <rect x="350" y="298" width="220" height="70" class="box"/>
  <text x="460" y="326" class="hn" font-size="14" text-anchor="middle">STATUS LEDGER</text>
  <text x="460" y="348" class="bk" font-size="13" text-anchor="middle">one comment, updated in place</text>

  <!-- Skills library -->
  <rect x="62" y="298" width="210" height="146" class="box"/>
  <text x="167" y="326" class="hn" font-size="14" text-anchor="middle">SKILLS LIBRARY</text>
  <text x="167" y="348" class="bk" font-size="13" text-anchor="middle">marketing-ai-cortex, on GitHub</text>
  <text x="167" y="372" class="bk" font-size="13" text-anchor="middle">versioned · eval criteria</text>
  <text x="167" y="392" class="bk" font-size="13" text-anchor="middle">code/model boundary declared</text>
  <text x="167" y="412" class="bk" font-size="13" text-anchor="middle">sanitized before publishing</text>

  <!-- Arrows -->
  <line x1="272" y1="166" x2="344" y2="166" class="line" marker-end="url(#arr3)"/>
  <text x="284" y="156" class="bk" font-size="13">reads</text>
  <line x1="570" y1="166" x2="642" y2="166" class="line" marker-end="url(#arr3)"/>
  <line x1="460" y1="220" x2="460" y2="292" class="line" marker-end="url(#arr3)"/>
  <text x="472" y="260" class="bk" font-size="13">updates</text>
  <line x1="272" y1="352" x2="376" y2="228" class="line" marker-end="url(#arr3)"/>
  <text x="298" y="284" class="bk" font-size="13">powers</text>

  <!-- Result line -->
  <line x1="62" y1="462" x2="838" y2="462" class="line"/>
  <text x="62" y="494" class="hn" font-size="15">Every agent action leaves a paper trail</text>
</svg>
